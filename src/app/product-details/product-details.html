<div class="container">
  <div class="row">
    <div class="col">
     <img [src]="singleProduct.image" class="img-fluid" alt="Product">
    </div>
    <div class="col">
    <h2>{{ singleProduct.name }}</h2>

    <p><strong>Cuisine:</strong> {{ singleProduct.cuisine }}</p>

<p><strong>Difficulty:</strong> {{ singleProduct.difficulty }}</p>

<p><strong>Prep Time:</strong> {{ singleProduct.prepTimeMinutes }} mins</p>

<p><strong>Cook Time:</strong> {{ singleProduct.cookTimeMinutes }} mins</p>

    <button class="btn btn-primary">Buy Now</button>
</div>
    
  </div>
</div>
